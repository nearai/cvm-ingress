name: Build and Push

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_REPOSITORY: nearaidev/cvm-ingress

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: nearaidev
          password: ${{ secrets.DOCKER_REGISTRY_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Determine image tag
        run: |
          if [[ "${GITHUB_REF_TYPE}" == 'tag' ]]; then
            TAG=${GITHUB_REF_NAME#v}
          else
            TAG='latest'
          fi
          echo "IMAGE_TAG=${TAG}" >> "$GITHUB_ENV"

      - name: Build and push
        uses: docker/build-push-action@v6
        id: docker_build
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}:${{ env.IMAGE_TAG }}
          build-args: |
            GIT_COMMIT=${{ github.sha }}

      - name: Generate artifact attestation (GitHub)
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}
          subject-digest: ${{ steps.docker_build.outputs.digest }}
          push-to-registry: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v3.0.5

      - name: Sign image with cosign (keyless)
        run: |
          cosign sign --yes "${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}@${{ steps.docker_build.outputs.digest }}"

      - name: Generate build summary
        run: |
          {
            echo "## cvm-ingress docker image"
            echo ""
            echo "- tag: \`${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}:${{ env.IMAGE_TAG }}\`"
            echo "- digest: \`${{ steps.docker_build.outputs.digest }}\`"
            echo "- commit: \`${{ github.sha }}\`"
            echo "- sigstore: https://search.sigstore.dev/?hash=${{ steps.docker_build.outputs.digest }}"
          } >> "$GITHUB_STEP_SUMMARY"
