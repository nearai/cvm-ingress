name: Reproducible Build

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  verify-reproducibility:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: First build
        id: first
        run: |
          bash ./build-image.sh
          echo "sha=$(sha256sum oci.tar | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          git diff --exit-code -- pinned-packages.txt
          rm -f oci.tar

      - name: Second build
        id: second
        run: |
          bash ./build-image.sh
          echo "sha=$(sha256sum oci.tar | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          git diff --exit-code -- pinned-packages.txt

      - name: Compare build outputs
        run: |
          test "${{ steps.first.outputs.sha }}" = "${{ steps.second.outputs.sha }}"
          {
            echo "## Reproducible Build"
            echo ""
            echo "- first build OCI sha256: \`${{ steps.first.outputs.sha }}\`"
            echo "- second build OCI sha256: \`${{ steps.second.outputs.sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
